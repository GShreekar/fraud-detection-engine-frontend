##############################################################################
# Docker Compose — Fraud Detection Frontend
#
# Profiles:
#   (default / standalone)  — Full stack including fraud-api from Docker Hub
#   dev                     — Frontend + backend only; fraud-api on host machine
#   full                    — Everything + Neo4j Browser + Redis Commander
##############################################################################

services:
  # ─── Frontend (Nginx) ──────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - fraud-net

  # ─── Backend (Node.js + Socket.IO) ────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      PORT: 3001
      FRAUD_API_URL: ${FRAUD_API_URL:-http://fraud-api:8000}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: "*"
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fraud-net

  # ─── Fraud Detection API (Docker Hub — standalone only) ───────────
  fraud-api:
    image: ${FRAUD_API_IMAGE:-yourorg/fraud-detection-engine:latest}
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      REDIS_URL: redis://redis:6379
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - standalone
    networks:
      - fraud-net

  # ─── Neo4j ────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - fraud-net

  # ─── Redis ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - fraud-net

  # ─── Neo4j Browser (full profile only) ────────────────────────────
  neo4j-browser:
    image: neo4j:5-community
    ports:
      - "7475:7474"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
    profiles:
      - full
    networks:
      - fraud-net

  # ─── Redis Commander (full profile only) ──────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - full
    networks:
      - fraud-net

volumes:
  neo4j_data:
  neo4j_logs:
  redis_data:

networks:
  fraud-net:
    driver: bridge
